<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B1A1A"/>
      <stop offset="100%" style="stop-color:#C03030"/>
    </linearGradient>
    <linearGradient id="faviconGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A6E"/>
      <stop offset="100%" style="stop-color:#2A4A8A"/>
    </linearGradient>
  </defs>
  
  <!-- الخلفية -->
  <rect width="100" height="100" rx="20" fill="url(#faviconGradient)"/>
  
  <!-- الشكل الداخلي الأيمن -->
  <path d="M20 50 Q35 25,50 50 Q35 75,20 50" fill="url(#faviconGradient2)"/>
  
  <!-- الشكل الداخلي الأيسر -->
  <path d="M50 50 Q65 25,80 50 Q65 75,50 50" fill="url(#faviconGradient2)" opacity="0.7"/>
  
  <!-- النص -->
  <text x="50" y="65" text-anchor="middle" fill="white" font-family="Cairo, sans-serif" font-weight="800" font-size="28">
    UX
  </text>
</svg>